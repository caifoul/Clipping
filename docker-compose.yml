services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - media_data:${MEDIA_ROOT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-cpu:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    command: celery -A app.tasks.celery_app worker -Q cpu --concurrency=2 --loglevel=info
    volumes:
      - media_data:${MEDIA_ROOT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-io:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    command: celery -A app.tasks.celery_app worker -Q io --concurrency=8 --loglevel=info
    volumes:
      - media_data:${MEDIA_ROOT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  media_data:
  caddy_data:
  caddy_config:
