<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Clipper</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0f1115;
    --panel: #171a21;
    --border: #2a2f3a;
    --text: #e8eaed;
    --muted: #9aa1ac;
    --accent: #6ea8fe;
    --ok: #4caf7d;
    --err: #e5686b;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --border: #dfe3e8;
      --text: #16181d;
      --muted: #5c6470;
      --accent: #2461d6;
      --ok: #1e8e5a;
      --err: #c62828;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 2rem 1.25rem 4rem;
  }
  .wrap { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
  p.sub { color: var(--muted); margin-top: 0; margin-bottom: 1.5rem; }

  form {
    display: grid;
    gap: 0.75rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
  }
  label { font-size: 0.85rem; color: var(--muted); display: block; margin-bottom: 0.3rem; }
  input {
    width: 100%;
    padding: 0.55rem 0.7rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 0.95rem;
  }
  .row { display: grid; grid-template-columns: 1fr 140px; gap: 0.75rem; }
  button {
    justify-self: start;
    background: var(--accent);
    color: #06101f;
    border: none;
    font-weight: 600;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.95rem;
  }
  button:disabled { opacity: 0.5; cursor: default; }

  #status-panel { margin-top: 1.5rem; display: none; }
  .badge {
    display: inline-block;
    padding: 0.15rem 0.6rem;
    border-radius: 999px;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .badge.queued, .badge.running { background: rgba(110,168,254,0.15); color: var(--accent); }
  .badge.done { background: rgba(76,175,125,0.15); color: var(--ok); }
  .badge.error { background: rgba(229,104,107,0.15); color: var(--err); }

  #stage-log {
    margin-top: 0.75rem;
    font-size: 0.85rem;
    color: var(--muted);
    max-height: 160px;
    overflow-y: auto;
    border-left: 2px solid var(--border);
    padding-left: 0.75rem;
  }
  #stage-log div { padding: 0.15rem 0; }
  #error-box {
    margin-top: 0.75rem;
    color: var(--err);
    font-size: 0.9rem;
    white-space: pre-wrap;
  }

  h2 { font-size: 1.1rem; margin: 2rem 0 0.75rem; }
  .grid { display: grid; gap: 1rem; }
  .grid.medium { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
  .grid.short { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .card video { width: 100%; display: block; background: #000; }
  .card .meta { padding: 0.6rem 0.75rem 0.8rem; font-size: 0.82rem; }
  .card .score { color: var(--accent); font-weight: 600; }
  .card .reasoning { color: var(--muted); margin-top: 0.25rem; }
  .card a.dl { display: inline-block; margin-top: 0.5rem; font-size: 0.8rem; color: var(--accent); text-decoration: none; }
  .card a.dl:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Clipper</h1>
  <p class="sub">Paste a video link and a topic — medium clips come back reframed &amp; captioned, shorts come back plain.</p>

  <form id="job-form">
    <div>
      <label for="url">Video URL (YouTube / Twitch VOD)</label>
      <input id="url" name="url" type="text" placeholder="https://www.youtube.com/watch?v=..." required />
    </div>
    <div>
      <label for="topic">Topic</label>
      <input id="topic" name="topic" type="text" placeholder="e.g. turret executions and clutch kills" required />
    </div>
    <div class="row">
      <div></div>
      <div>
        <label for="max_segments">Max clips</label>
        <input id="max_segments" name="max_segments" type="number" min="1" max="10" value="5" />
      </div>
    </div>
    <button id="submit-btn" type="submit">Generate clips</button>
  </form>

  <div id="status-panel">
    <span id="status-badge" class="badge queued">queued</span>
    <div id="stage-log"></div>
    <div id="error-box"></div>
  </div>

  <div id="results"></div>
</div>

<script>
const form = document.getElementById("job-form");
const submitBtn = document.getElementById("submit-btn");
const statusPanel = document.getElementById("status-panel");
const statusBadge = document.getElementById("status-badge");
const stageLog = document.getElementById("stage-log");
const errorBox = document.getElementById("error-box");
const results = document.getElementById("results");

let pollTimer = null;

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  submitBtn.disabled = true;
  results.innerHTML = "";
  errorBox.textContent = "";
  stageLog.innerHTML = "";
  statusPanel.style.display = "block";
  setStatus("queued");

  const body = {
    url: document.getElementById("url").value.trim(),
    topic: document.getElementById("topic").value.trim(),
    max_segments: parseInt(document.getElementById("max_segments").value, 10) || 5,
  };

  const resp = await fetch("/api/jobs", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  const { job_id } = await resp.json();

  let lastStageCount = 0;
  pollTimer = setInterval(async () => {
    const r = await fetch(`/api/jobs/${job_id}`);
    const job = await r.json();
    setStatus(job.status);

    if (job.stages.length > lastStageCount) {
      for (const stage of job.stages.slice(lastStageCount)) {
        const line = document.createElement("div");
        line.textContent = stage;
        stageLog.appendChild(line);
      }
      lastStageCount = job.stages.length;
      stageLog.scrollTop = stageLog.scrollHeight;
    }

    if (job.status === "done") {
      clearInterval(pollTimer);
      submitBtn.disabled = false;
      renderResults(job);
    } else if (job.status === "error") {
      clearInterval(pollTimer);
      submitBtn.disabled = false;
      errorBox.textContent = job.error || "Unknown error";
    }
  }, 2000);
});

function setStatus(status) {
  statusBadge.textContent = status;
  statusBadge.className = "badge " + status;
}

function clipCard(clip) {
  const card = document.createElement("div");
  card.className = "card";
  const scoreField = "relevance_score" in clip ? clip.relevance_score : clip.virality_score;
  card.innerHTML = `
    <video src="${clip.url}" controls preload="metadata"></video>
    <div class="meta">
      <div class="score">score: ${(scoreField ?? 0).toFixed(2)}</div>
      <div class="reasoning">${clip.reasoning || ""}</div>
      <a class="dl" href="${clip.url}" download>Download</a>
    </div>
  `;
  return card;
}

function renderResults(job) {
  results.innerHTML = "";

  if (job.medium_clips.length) {
    const h = document.createElement("h2");
    h.textContent = "Medium clips (reframed + captioned)";
    results.appendChild(h);
    const grid = document.createElement("div");
    grid.className = "grid medium";
    job.medium_clips.forEach((c) => grid.appendChild(clipCard(c)));
    results.appendChild(grid);
  }

  if (job.short_clips.length) {
    const h = document.createElement("h2");
    h.textContent = "Short clips (plain, for you to finish)";
    results.appendChild(h);
    const grid = document.createElement("div");
    grid.className = "grid short";
    job.short_clips.forEach((c) => grid.appendChild(clipCard(c)));
    results.appendChild(grid);
  }
}
</script>
</body>
</html>
